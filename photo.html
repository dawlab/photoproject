<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>365</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body>

<div id="header-placeholder"></div>
<main class="photo-page" id="app"><div class="spinner"></div></main>
<section class="memories-strip" id="memoriesStrip" style="display:none">
  <div class="memories-inner" id="memoriesInner"></div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/static/js/supabase.js"></script>
<script src="/static/js/header.js"></script>
<script src="/static/js/moods.js"></script>
<script src="/static/js/utils.js"></script>
<script>
const id = new URLSearchParams(location.search).get('id');

async function loadMemories() {
  const { data: photo } = await sb.from('photos').select('shot_at, created_at').eq('id', id).single();
  if (!photo) return;
  const base = new Date(photo.shot_at || photo.created_at);
  if (isNaN(base)) return;

  const intervals = [
    { label: 'Tydzień temu',  fn: d => { d.setDate(d.getDate() - 7); return d; } },
    { label: 'Miesiąc temu',  fn: d => { d.setMonth(d.getMonth() - 1); return d; } },
    { label: 'Rok temu',      fn: d => { d.setFullYear(d.getFullYear() - 1); return d; } },
    { label: '2 lata temu',   fn: d => { d.setFullYear(d.getFullYear() - 2); return d; } },
    { label: '3 lata temu',   fn: d => { d.setFullYear(d.getFullYear() - 3); return d; } },
  ];

  const memories = [];
  for (const { label, fn } of intervals) {
    const target = fn(new Date(base));
    const dateStr = target.toISOString().slice(0, 10);
    const { data } = await sb.from('photos')
      .select('id, title, thumb, day')
      .neq('id', id)
      .gte('shot_at', dateStr + 'T00:00:00')
      .lte('shot_at', dateStr + 'T23:59:59')
      .limit(1).maybeSingle();
    if (data) memories.push({ label, ...data });
  }

  if (!memories.length) return;
  const inner = document.getElementById('memoriesInner');
  inner.innerHTML = memories.map(m => `
    <a href="/photo.html?id=${m.id}" class="memory-card">
      <div class="memory-img"><img src="${thumbUrl(m.thumb)}" alt="${m.title}" loading="lazy"></div>
      <span class="memory-label">${m.label}</span>
    </a>`).join('');
  document.getElementById('memoriesStrip').style.display = '';
}

async function load() {
  const { data: p } = await sb.from('photos').select('*').eq('id', id).single();
  if (!p) { document.getElementById('app').innerHTML = '<p class="error">Nie znaleziono zdjęcia.</p>'; return; }
  document.title = `${p.title} – 365`;

  const { data: habits } = await sb.from('habits').select('*').eq('active', true).order('id');
  const { data: logs }   = await sb.from('habit_logs').select('*').eq('photo_id', id);
  const habitsWithLogs   = (habits || []).map(h => {
    const log = (logs || []).find(l => l.habit_id === h.id);
    return { ...h, done: log ? log.done : null };
  });

  const shotDate = (p.shot_at || p.created_at)
    ? new Date(p.shot_at || p.created_at).toLocaleDateString('pl-PL', { year: 'numeric', month: 'long', day: 'numeric' })
    : null;

  const exifRows = [
    p.exif_make || p.exif_model ? ['Aparat', [p.exif_make, p.exif_model].filter(Boolean).join(' ')] : null,
    p.exif_lens     ? ['Obiektyw', p.exif_lens]      : null,
    p.exif_focal    ? ['Ogniskowa', p.exif_focal]    : null,
    p.exif_aperture ? ['Przysłona', p.exif_aperture] : null,
    p.exif_shutter  ? ['Czas', p.exif_shutter]       : null,
    p.exif_iso      ? ['ISO', p.exif_iso]             : null,
  ].filter(Boolean);

  const moodHtml = p.mood && MOODS[p.mood]
    ? `<div class="mood-pill">${moodSvg(p.mood, 22)}<span>${MOODS[p.mood].label}</span></div>` : '';

  const imgSrc = p.display ? photoUrl(p.display) : photoUrl(p.filename);

  document.getElementById('app').innerHTML = `
    <div class="photo-nav">
      <a href="/" class="back-link">← Wszystkie zdjęcia</a>
      <span class="day-badge">Dzień ${p.day}</span>
    </div>
    <div class="photo-layout">
      <div class="photo-img-wrap">
        <img src="${imgSrc}" alt="${p.title}" class="photo-full">
      </div>
      <aside class="photo-sidebar">
        <h1 class="photo-title">${p.title}</h1>
        ${shotDate ? `<p class="photo-date">${shotDate}</p>` : ''}
        ${p.description ? `<p class="photo-desc">${p.description}</p>` : ''}
        ${moodHtml}
        ${habitsWithLogs.length ? `
        <div class="habits-block">
          <h3 class="exif-heading">Nawyki</h3>
          <ul class="habits-list">
            ${habitsWithLogs.map(h => `<li class="habit-item ${h.done === true ? 'habit-done' : h.done === null ? 'habit-unset' : 'habit-fail'}">
              <span class="habit-icon">${h.done === true ? '✓' : h.done === null ? '–' : '✗'}</span>
              <span>${h.name}</span></li>`).join('')}
          </ul>
        </div>` : ''}
        ${exifRows.length ? `
        <div class="exif-block">
          <h3 class="exif-heading">EXIF</h3>
          <dl class="exif-list">
            ${exifRows.map(([k, v]) => `<div class="exif-row"><dt>${k}</dt><dd>${v}</dd></div>`).join('')}
          </dl>
        </div>` : ''}
      </aside>
    </div>`;
}

load();
loadMemories();
</script>
</body>
</html>
