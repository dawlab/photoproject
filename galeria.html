<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Galeria – 365</title>
<link rel="icon" type="image/svg+xml" href="static/favicon.svg">
<link rel="stylesheet" href="static/css/main.css">
</head>
<body>

<div id="header-placeholder"></div>
<main id="app"><div class="spinner"></div></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="static/js/supabase.js"></script>
<script src="static/js/header.js"></script>
<script src="static/js/utils.js"></script>
<script>
const gid = new URLSearchParams(location.search).get('id');
function plural(n) { return n === 1 ? 'zdjęcie' : n >= 2 && n <= 4 ? 'zdjęcia' : 'zdjęć'; }

async function load() {
  const { data: g } = await sb.from('galleries').select('*').eq('id', gid).single();
  if (!g) { document.getElementById('app').innerHTML = '<p class="error">Nie znaleziono galerii.</p>'; return; }

  const { data: gp } = await sb.from('gallery_photos')
    .select('photo_id, position, photos(*)')
    .eq('gallery_id', gid)
    .order('position');

  const photos = (gp || []).map(r => r.photos).filter(Boolean);
  document.title = `${g.title} – 365`;

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="gallery-header">
      <a href="galerie.html" class="back-link">← Wszystkie galerie</a>
      <h1 class="gallery-page-title">${g.title}</h1>
      ${g.description ? `<p class="gallery-desc">${g.description}</p>` : ''}
      <p class="gallery-meta">${photos.length} ${plural(photos.length)}</p>
    </div>
    <div class="photo-feed" id="feed"></div>`;

  const feed = document.getElementById('feed');
  photos.forEach(p => {
    const a = document.createElement('a');
    a.className = 'feed-card';
    a.href = `photo.html?id=${p.id}`;
    if (p.width && p.height) a.style.flexGrow = (p.width / p.height).toFixed(4);
    const date = photoDate(p);
    a.innerHTML = `
      <div class="feed-card__img"><img src="${thumbUrl(p.thumb)}" alt="${p.title}" loading="lazy"></div>
      <div class="feed-card__meta">
        <div class="card-meta-top">
          <span class="day-num">Dzień ${p.day}</span>
          ${date ? `<span class="card-date">${date}</span>` : ''}
        </div>
        <span class="card-title">${p.title}</span>
      </div>`;
    feed.appendChild(a);
  });
}

load();
</script>
</body>
</html>
